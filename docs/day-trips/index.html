<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day Trips - London Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="../map/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="../" class="header-home" title="Home">&#8962;</a>
      <div class="header-content">
        <h1 class="header-title">Day Trips</h1>
        <p class="header-subtitle">Excursions beyond London - castles, coasts, countryside</p>
      </div>
    </div>
  </header>
  <aside id="controls" class="controls-panel">
    <button class="controls-toggle" id="controlsToggle" aria-label="Toggle filters">
      <span class="toggle-icon">&#9776;</span>
      <span class="toggle-label">Filters</span>
    </button>
    <div class="controls-body" id="controlsBody">
      <div class="controls-section">
        <h3 class="controls-heading">Category</h3>
        <div id="categoryFilters" class="filter-group"></div>
      </div>
      <div class="controls-section">
        <h3 class="controls-heading">Neighborhood</h3>
        <div id="neighborhoodFilters" class="filter-group filter-group-scroll"></div>
      </div>
      <div class="controls-section">
        <h3 class="controls-heading">Visited</h3>
        <div id="visitedFilters" class="filter-group"></div>
      </div>
      <div class="controls-section controls-meta">
        <button class="btn-reset" id="resetFilters">Show All Sites</button>
        <button class="btn-toggle-view" id="viewToggle">List View</button>
        <p class="site-count"><span id="visibleCount">0</span> of <span id="totalCount">0</span> sites shown</p>
      </div>
    </div>
  </aside>
  <div id="map"></div>
  <div id="listView" class="list-view hidden">
    <div class="list-container" id="listContainer"></div>
  </div>
  <div class="map-legend" id="mapLegend"></div>
  <script>
    window.MAP_CONFIG = {
      category: "day-trips",
      title: "Day Trips",
      subtitle: "Excursions beyond London - castles, coasts, countryside"
    };
  </script>
  <script src="../map/app.js"></script>
</body>
</html>
